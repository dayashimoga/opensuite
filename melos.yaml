name: fileutility
repository: https://github.com/user/fileutility

packages:
  - apps/*
  - packages/*

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: melos exec -- "flutter analyze"
    description: Run static analysis across all packages

  format:
    run: melos exec -- "dart format --set-exit-if-changed ."
    description: Check formatting across all packages

  format:fix:
    run: melos exec -- "dart format ."
    description: Fix formatting across all packages

  test:
    run: melos exec -- "flutter test --coverage"
    description: Run tests across all packages

  test:unit:
    run: melos exec --scope="packages/*" -- "flutter test --coverage"
    description: Run unit tests in packages only

  test:app:
    run: melos exec --scope="apps/*" -- "flutter test --coverage"
    description: Run tests in apps only

  build:web:
    run: melos exec --scope="apps/fileutility" -- "flutter build web --release"
    description: Build web release

  build:android:
    run: melos exec --scope="apps/fileutility" -- "flutter build apk --release"
    description: Build Android APK

  build:windows:
    run: melos exec --scope="apps/fileutility" -- "flutter build windows --release"
    description: Build Windows executable

  build:linux:
    run: melos exec --scope="apps/fileutility" -- "flutter build linux --release"
    description: Build Linux executable

  build:macos:
    run: melos exec --scope="apps/fileutility" -- "flutter build macos --release"
    description: Build macOS application

  clean:
    run: melos exec -- "flutter clean"
    description: Clean all packages

  gen:
    run: melos exec -- "dart run build_runner build --delete-conflicting-outputs"
    description: Run code generation across all packages
