services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app
    command: bash
    stdin_open: true
    tty: true

  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app/apps/opensuite
    command: bash -c "cd /app && for pkg in packages/core packages/l10n packages/storage packages/ui_kit apps/opensuite; do (cd $$pkg && flutter pub get); done && cd /app/apps/opensuite && flutter test --coverage"

  lint:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app/apps/opensuite
    command: bash -c "cd /app && for pkg in packages/core packages/l10n packages/storage packages/ui_kit apps/opensuite; do (cd $$pkg && flutter pub get); done && cd /app/apps/opensuite && flutter analyze"

  format:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app
    command: dart format --set-exit-if-changed .

  security-scan:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app/apps/opensuite
    command: dart pub audit

  build-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app/apps/opensuite
    command: flutter build web --release

  build-android:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app/apps/opensuite
    command: flutter build apk --release

  build-linux:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/app
    working_dir: /app/apps/opensuite
    command: flutter build linux --release
