name: fileutility_core
description: Core package providing DI, logging, error handling, configuration, and feature flags for OpenSuite.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get_it: ^8.0.3
  logger: ^2.5.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  path: any
  intl: any
  collection: any
  file_picker: ^9.2.1
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

