name: fileutility_storage
description: Offline-first storage package providing database, key-value, and file storage abstractions.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  fileutility_core:
    path: ../core
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: any
  uuid: ^4.5.1
  collection: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

