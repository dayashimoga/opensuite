name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: |
          for pkg in packages/core packages/l10n packages/storage packages/ui_kit apps/opensuite; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: cd apps/opensuite && flutter analyze

      - name: Security audit
        run: |
          cd packages/core && dart pub audit || true
          cd ../storage && dart pub audit || true
          cd ../../apps/opensuite && dart pub audit || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: |
          for pkg in packages/core packages/l10n packages/storage packages/ui_kit apps/opensuite; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Run core package tests
        run: cd packages/core && flutter test --coverage

      - name: Run app tests with coverage
        run: cd apps/opensuite && flutter test --coverage

      - name: Check coverage threshold
        run: |
          if [ -f apps/opensuite/coverage/lcov.info ]; then
            LINES_FOUND=$(grep -c "^DA:" apps/opensuite/coverage/lcov.info || echo "0")
            LINES_HIT=$(grep "^DA:" apps/opensuite/coverage/lcov.info | grep -cv ",0$" || echo "0")
            if [ "$LINES_FOUND" -gt 0 ]; then
              COVERAGE=$(( LINES_HIT * 100 / LINES_FOUND ))
              echo "Coverage: ${COVERAGE}%"
              if [ "$COVERAGE" -lt 70 ]; then
                echo "::warning::Coverage ${COVERAGE}% is below 70% threshold"
              fi
            fi
          fi

      - name: Upload core coverage
        uses: actions/upload-artifact@v4
        with:
          name: core-coverage
          path: packages/core/coverage/

      - name: Upload app coverage
        uses: actions/upload-artifact@v4
        with:
          name: app-coverage
          path: apps/opensuite/coverage/

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: |
          for pkg in packages/core packages/l10n packages/storage packages/ui_kit apps/opensuite; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Build web
        run: cd apps/opensuite && flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/opensuite/build/web/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: |
          for pkg in packages/core packages/l10n packages/storage packages/ui_kit apps/opensuite; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Build APK
        run: cd apps/opensuite && flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/opensuite/build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsqlite3-dev

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: |
          for pkg in packages/core packages/l10n packages/storage packages/ui_kit apps/opensuite; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Build Linux
        run: cd apps/opensuite && flutter build linux --release

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: apps/opensuite/build/linux/x64/release/bundle/

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    needs: test
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        shell: pwsh
        run: |
          $packages = @("packages\core", "packages\l10n", "packages\storage", "packages\ui_kit", "apps\opensuite")
          foreach ($pkg in $packages) {
            Push-Location $pkg
            flutter pub get
            Pop-Location
          }

      - name: Enable Developer Mode
        shell: pwsh
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /v AllowDevelopmentWithoutDevLicense /t REG_DWORD /d 1 /f

      - name: Build Windows
        run: cd apps/opensuite && flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: apps/opensuite/build/windows/x64/runner/Release/

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: |
          for pkg in packages/core packages/l10n packages/storage packages/ui_kit apps/opensuite; do
            (cd "$pkg" && flutter pub get)
          done

      - name: Generate iOS project if missing
        run: |
          if [ ! -d "apps/opensuite/ios" ]; then
            cd apps/opensuite && flutter create --platforms=ios --org com.opensuite .
          fi

      - name: Install CocoaPods
        run: cd apps/opensuite/ios && pod install --repo-update || true

      - name: Build iOS (no codesign)
        run: cd apps/opensuite && flutter build ios --release --no-codesign

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Create Cloudflare Pages project (if not exists)
        run: wrangler pages project create opensuite --production-branch main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy web-build/ --project-name=opensuite
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
