name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd packages/core && flutter pub get
          cd ../l10n && flutter pub get
          cd ../storage && flutter pub get
          cd ../ui_kit && flutter pub get
          cd ../../apps/opensuite && flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: |
          cd apps/opensuite && flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd packages/core && flutter pub get
          cd ../l10n && flutter pub get
          cd ../storage && flutter pub get
          cd ../ui_kit && flutter pub get
          cd ../../apps/opensuite && flutter pub get

      - name: Run tests with coverage
        run: |
          cd apps/opensuite && flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/opensuite/coverage/

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd packages/core && flutter pub get
          cd ../l10n && flutter pub get
          cd ../storage && flutter pub get
          cd ../ui_kit && flutter pub get
          cd ../../apps/opensuite && flutter pub get

      - name: Build web
        run: cd apps/opensuite && flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/opensuite/build/web/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd packages/core && flutter pub get
          cd ../l10n && flutter pub get
          cd ../storage && flutter pub get
          cd ../ui_kit && flutter pub get
          cd ../../apps/opensuite && flutter pub get

      - name: Build APK
        run: cd apps/opensuite && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/opensuite/build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies
        run: |
          cd packages/core && flutter pub get
          cd ../l10n && flutter pub get
          cd ../storage && flutter pub get
          cd ../ui_kit && flutter pub get
          cd ../../apps/opensuite && flutter pub get

      - name: Build Linux
        run: cd apps/opensuite && flutter build linux --release

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: apps/opensuite/build/linux/x64/release/bundle/

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web-build/ --project-name=opensuite
